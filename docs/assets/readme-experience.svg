<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="60" y1="40" x2="1120" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111D"/>
      <stop offset="1" stop-color="#132338"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg2)"/>

  <rect x="50" y="80" width="250" height="150" rx="24" fill="#0F1C2E" stroke="#2C4763"/>
  <text x="80" y="125" fill="#7DD3FC" font-size="20" font-family="Inter, Arial, sans-serif">1. 用户表达一个高层意图</text>
  <text x="80" y="172" fill="#F8FAFC" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">“我今天很累，回家了”</text>

  <rect x="335" y="80" width="250" height="150" rx="24" fill="#0F1C2E" stroke="#2C4763"/>
  <text x="365" y="125" fill="#34D399" font-size="20" font-family="Inter, Arial, sans-serif">2. 运行时读取家庭上下文</text>
  <text x="365" y="165" fill="#D7E2F0" font-size="22" font-family="Inter, Arial, sans-serif">时间 / 日程 / 房间状态</text>
  <text x="365" y="198" fill="#D7E2F0" font-size="22" font-family="Inter, Arial, sans-serif">专注模式 / 提醒 / 风险等级</text>

  <rect x="620" y="80" width="250" height="150" rx="24" fill="#0F1C2E" stroke="#2C4763"/>
  <text x="650" y="125" fill="#FBBF24" font-size="20" font-family="Inter, Arial, sans-serif">3. 给出候选场景</text>
  <text x="650" y="165" fill="#F8FAFC" font-size="24" font-family="Inter, Arial, sans-serif">Rest Recovery Mode</text>
  <text x="650" y="198" fill="#CBD5E1" font-size="20" font-family="Inter, Arial, sans-serif">Prepare Sleep Transition</text>

  <rect x="905" y="80" width="250" height="150" rx="24" fill="#0F1C2E" stroke="#2C4763"/>
  <text x="935" y="125" fill="#C084FC" font-size="20" font-family="Inter, Arial, sans-serif">4. 执行一个高层场景</text>
  <text x="935" y="165" fill="#F8FAFC" font-size="22" font-family="Inter, Arial, sans-serif">开玄关灯</text>
  <text x="935" y="198" fill="#F8FAFC" font-size="22" font-family="Inter, Arial, sans-serif">卧室空调切到 sleep_20c</text>

  <rect x="125" y="312" width="950" height="130" rx="26" fill="#0B1626" stroke="#28435F"/>
  <text x="160" y="355" fill="#E2E8F0" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">重点不是“让 AI 开灯”，而是让它先理解人在什么状态，再决定要不要开灯。</text>
  <text x="160" y="398" fill="#8FA4BF" font-size="22" font-family="Inter, Arial, sans-serif">这就是本项目要验证的方向：从工具调用，走向更像“管家”的家庭操作系统。</text>

  <path d="M300 155H335" stroke="#476C8F" stroke-width="4" stroke-linecap="round"/>
  <path d="M585 155H620" stroke="#476C8F" stroke-width="4" stroke-linecap="round"/>
  <path d="M870 155H905" stroke="#476C8F" stroke-width="4" stroke-linecap="round"/>
</svg>
