<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1080" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#132238"/>
    </linearGradient>
    <linearGradient id="panel" x1="140" y1="120" x2="760" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14233A"/>
      <stop offset="1" stop-color="#0C1626"/>
