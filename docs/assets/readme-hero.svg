  <text x="852" y="572" fill="#E2E8F0" font-size="18" font-family="Inter, Arial, sans-serif">Late Arrival Quiet Return</text>

  <path d="M770 395C805 395 790 315 815 315" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M770 430C805 430 790 487 815 487" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>

  <text x="110" y="605" fill="#AABDD3" font-size="18" font-family="Inter, Arial, sans-serif">当前能力：虚拟智能家居、Home Assistant 接入、外部 MCP、场景建议、场景执行、可视化观察</text>
