services:
  butler-app:
    image: proactive-ai-butler-mvp-butler-app:latest
    build:
      context: .
    container_name: butler-app
    restart: unless-stopped
    environment:
      PORT: 8787
      HOST: 0.0.0.0
      PLANNER_MODE: ${PLANNER_MODE:-mock}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      MQTT_URL: mqtt://mosquitto:1883
      MQTT_ROOT_TOPIC: butler
    ports:
      - "8787:8787"
    depends_on:
      - mosquitto
    networks:
      - butler-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: butler-mosquitto
    restart: unless-stopped
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    ports:
      - "1883:1883"
    networks:
      - butler-net

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: butler-homeassistant
    restart: unless-stopped
    privileged: true
    volumes:
      - ./infra/homeassistant:/config
    ports:
      - "8123:8123"
    depends_on:
      - mosquitto
    networks:
      - butler-net

networks:
  butler-net:
    driver: bridge

volumes:
  mosquitto-data:
  mosquitto-log:
